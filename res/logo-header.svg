<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">

  <!-- Background rounded square -->
  <rect width="256" height="256" rx="48" fill="#EAF2F8"/>

  <!-- Monitor outer frame -->
  <rect x="28" y="52" width="200" height="138" rx="14" fill="#7FA8C0"/>

  <!-- Monitor screen -->
  <rect x="36" y="60" width="184" height="122" rx="10" fill="#C5DCE9"/>

  <!-- Title bar -->
  <rect x="36" y="60" width="184" height="28" rx="10" fill="#7FA8C0"/>
  <rect x="36" y="74" width="184" height="14" fill="#7FA8C0"/>

  <!-- Window controls -->
  <circle cx="58"  cy="74" r="5" fill="#EAF2F8" opacity="0.9"/>
  <circle cx="76"  cy="74" r="5" fill="#A8C8DE" opacity="0.9"/>
  <circle cx="94"  cy="74" r="5" fill="#C5DCE9" opacity="0.9"/>

  <!-- Content lines -->
  <rect x="52" y="100" width="90" height="8" rx="4" fill="#7FA8C0" opacity="0.7"/>
  <rect x="52" y="116" width="152" height="6" rx="3" fill="#A8C8DE" opacity="0.6"/>
  <rect x="52" y="128" width="130" height="6" rx="3" fill="#A8C8DE" opacity="0.6"/>
  <rect x="52" y="140" width="144" height="6" rx="3" fill="#A8C8DE" opacity="0.5"/>
  <rect x="52" y="158" width="70" height="22" rx="8" fill="#7FA8C0"/>
  <rect x="130" y="158" width="74" height="22" rx="8" fill="#C5DCE9"/>

  <!-- Monitor stand neck -->
  <rect x="110" y="190" width="36" height="18" rx="4" fill="#A8C8DE"/>

  <!-- Monitor stand base -->
  <rect x="80" y="206" width="96" height="10" rx="5" fill="#A8C8DE"/>

  <!-- Share arrows kiri -->
  <path d="M14 118 L26 118" stroke="#7FA8C0" stroke-width="5" stroke-linecap="round"/>
  <path d="M20 108 L10 118 L20 128" fill="none" stroke="#7FA8C0" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Share arrows kanan -->
  <path d="M242 118 L230 118" stroke="#7FA8C0" stroke-width="5" stroke-linecap="round"/>
  <path d="M236 108 L246 118 L236 128" fill="none" stroke="#7FA8C0" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>

</svg>
